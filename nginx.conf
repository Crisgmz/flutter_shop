events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 80;
        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ────────────────────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy       "strict-origin" always;

        # ── Flutter SPA routing ─────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # index.html — never cached so new deploys take effect immediately
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
        }

        # Flutter assets (hashed filenames) — immutable for 1 year
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Dart/Flutter compiled JS and WASM — immutable for 1 year
        location ~* \.(js|wasm)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fonts and icons — cache 1 year
        location ~* \.(woff|woff2|ttf|eot|ico|png|svg)$ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}
