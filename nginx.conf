events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── DNS resolver (para que nginx pueda resolver "supabase-kong" dinámicamente) ─
    # Usa el resolver interno de Docker; "valid=30s" evita pegarle a DNS en cada request.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upstream Kong (Supabase API gateway) ────────────────────────────────────
    # Resuelto en runtime gracias al `resolver` de arriba. Si el frontend y Kong
    # no están en la misma red Docker, cambiá $kong_upstream a la URL pública
    # del Kong (ej. http://supabasekong-...sslip.io:8000).
    map $request_uri $kong_upstream {
        default "http://supabase-kong:8000";
    }

    # WebSocket upgrade map (para /realtime/)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ────────────────────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy       "strict-origin" always;

        # ── Supabase API proxy ──────────────────────────────────────────────────
        # El browser carga la app en https://busiposweb.com/ y hace llamadas a
        # https://busiposweb.com/auth/v1/..., /rest/v1/..., /storage/v1/...
        # Nginx las proxea a Kong por HTTP interno. Resultado: el browser solo
        # ve HTTPS (no hay mixed content), y Kong no necesita su propio SSL.

        location /auth/ {
            proxy_pass         $kong_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_read_timeout 60s;
        }

        location /rest/ {
            proxy_pass         $kong_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_read_timeout 60s;
        }

        location /storage/ {
            proxy_pass         $kong_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_read_timeout 300s;
            client_max_body_size 50m;
        }

        # Realtime (WebSocket)
        location /realtime/ {
            proxy_pass         $kong_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ── Flutter SPA routing ─────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # index.html — never cached so new deploys take effect immediately
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
        }

        # Flutter assets (hashed filenames) — immutable for 1 year
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Dart/Flutter compiled JS and WASM — immutable for 1 year
        location ~* \.(js|wasm)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fonts and icons — cache 1 year
        location ~* \.(woff|woff2|ttf|eot|ico|png|svg)$ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}
