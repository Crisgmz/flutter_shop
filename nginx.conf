events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Gzip ────────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 80;
        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ────────────────────────────────────────────────────
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy       "strict-origin" always;

        # ── NUNCA CACHEAR (revalidar siempre) ───────────────────────────────────
        # Estos archivos NO tienen hash en el nombre y son los que orquestan
        # qué versión de Flutter cargar. Si los cacheamos, el browser nunca
        # sabe que hay una versión nueva.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma        "no-cache" always;
            add_header Expires       "0" always;
        }

        location = /flutter_bootstrap.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /flutter_service_worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /flutter.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /main.dart.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /version.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location = /manifest.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # ── CACHE AGRESIVO (1 año, immutable) ───────────────────────────────────
        # Estos archivos SÍ tienen hash en el nombre — si el contenido cambia,
        # el hash cambia y el browser pide el nuevo automáticamente.

        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /canvaskit/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fuentes e imágenes — 1 año (rara vez cambian)
        location ~* \.(woff|woff2|ttf|eot|ico|png|svg)$ {
            add_header Cache-Control "public, max-age=31536000";
        }

        # ── Flutter SPA routing ─────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
