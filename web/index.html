<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Busi Pos Web — sistema de punto de venta y gestión comercial.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Busi Pos Web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Busi Pos Web</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!--
    Auto-update del service worker.
    Cuando Coolify rebuildea, el nuevo flutter_service_worker.js trae un hash
    distinto. Este script:
      1. Le pide al browser que chequee el SW al cargar la pestaña.
      2. Si hay versión nueva, recarga la página automáticamente UNA vez la
         versión nueva esté activa (sin que el usuario tenga que hacer Ctrl+F5).
    No interrumpe la sesión: el state que persiste en localStorage / cookies
    (auth tokens, branch_id) sobrevive el reload.
  -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        // Evita loop infinito en algunos browsers
        if (window.__reloadingForSW) return;
        window.__reloadingForSW = true;
        window.location.reload();
      });
      navigator.serviceWorker.ready.then(function (reg) {
        // Chequea por update cuando la página gana foco (pestaña activa).
        window.addEventListener('focus', function () {
          reg.update().catch(function () {});
        });
        // Chequeo inicial al cargar.
        reg.update().catch(function () {});
      });
    })();
  </script>
</body>
</html>
