<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Busi Pos Web — sistema de punto de venta y gestión comercial.">

  <!-- Defensive cache headers en caso de que un proxy intermedio (Cloudflare,
       Traefik, etc.) no respete los headers HTTP de nginx. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Busi Pos Web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Busi Pos Web</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!--
    Auto-update sin Ctrl+F5.

    El SW de Flutter en versiones recientes se auto-desregistra después de
    activarse, así que NO podemos depender de 'controllerchange' para
    detectar updates en pestañas ya cargadas. Estrategia más confiable:

      1. Al cargar, guardamos la versión actual (de /version.json).
      2. Cada 60s y al ganar foco, re-fetcheamos /version.json (no-store).
      3. Si la versión cambió, mostramos un banner discreto pidiendo al
         usuario que recargue. Lo recargamos automático solo si la pestaña
         está en background — así no interrumpimos una venta a medias.

    /version.json está cacheado con no-cache en nginx, así que el fetch
    siempre va al server.
  -->
  <script>
    (function () {
      var initialVersion = null;
      var bannerShown = false;
      var versionUrl = 'version.json';

      function readVersion(obj) {
        if (!obj) return null;
        return (obj.version || '') + '|' + (obj.build_number || '');
      }

      function showUpdateBanner() {
        if (bannerShown) return;
        bannerShown = true;
        var bar = document.createElement('div');
        bar.style.cssText = [
          'position:fixed',
          'left:0',
          'right:0',
          'bottom:0',
          'z-index:2147483647',
          'background:#0B5ED7',
          'color:#fff',
          'padding:12px 16px',
          'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif',
          'font-size:14px',
          'display:flex',
          'gap:12px',
          'align-items:center',
          'justify-content:center',
          'box-shadow:0 -2px 12px rgba(0,0,0,0.18)',
        ].join(';');
        bar.innerHTML =
          '<span>Hay una nueva versión de Busi Pos Web disponible.</span>' +
          '<button id="bpw-reload-btn" style="background:#fff;color:#0B5ED7;border:0;padding:8px 14px;border-radius:6px;font-weight:600;cursor:pointer">Actualizar ahora</button>' +
          '<button id="bpw-later-btn" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.6);padding:7px 12px;border-radius:6px;cursor:pointer">Después</button>';
        document.body.appendChild(bar);
        document.getElementById('bpw-reload-btn').onclick = function () {
          window.location.reload();
        };
        document.getElementById('bpw-later-btn').onclick = function () {
          bar.remove();
        };
      }

      function checkVersion() {
        return fetch(versionUrl + '?t=' + Date.now(), { cache: 'no-store' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (data) {
            var v = readVersion(data);
            if (!v) return;
            if (initialVersion === null) {
              initialVersion = v;
              return;
            }
            if (v !== initialVersion) {
              if (document.hidden) {
                window.location.reload();
              } else {
                showUpdateBanner();
              }
            }
          })
          .catch(function () {});
      }

      // Primer chequeo: guarda baseline.
      checkVersion();
      // Polling cada 60s.
      setInterval(checkVersion, 60 * 1000);
      // Chequeo extra cuando el usuario vuelve a la pestaña.
      window.addEventListener('focus', checkVersion);
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) checkVersion();
      });
    })();
  </script>
</body>
</html>
